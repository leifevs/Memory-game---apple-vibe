<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diamond Memory</title>

<style>
:root {
  --bg: #0f1115;
  --card: #1c1f26;
  --accent: #ffffff;
  --blur: blur(20px);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(145deg, #0f1115, #1a1d24);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.app {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Glass UI */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: var(--blur);
  border-radius: 20px;
  padding: 20px;
}

/* Buttons */
button {
  background: rgba(255,255,255,0.08);
  border: none;
  padding: 12px;
  border-radius: 12px;
  color: white;
  font-size: 14px;
  margin: 5px;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  background: rgba(255,255,255,0.15);
}

/* Board */
.board {
  display: grid;
  gap: 10px;
  margin-top: 20px;
}

/* Cards */
.card {
  aspect-ratio: 1;
  border-radius: 14px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s ease;
}

.card.flip {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 14px;
  display: flex;
  justify-content: center;
  align-items: center;
  backface-visibility: hidden;
}

.front {
  background: var(--card);
}

.back {
  transform: rotateY(180deg);
}

/* Diamond shapes */
.diamond {
  width: 60%;
  height: 60%;
  clip-path: polygon(50% 0%, 100% 40%, 80% 100%, 20% 100%, 0% 40%);
}

/* Color variants */
.c1 { background: linear-gradient(135deg,#00f5ff,#00aaff); }
.c2 { background: linear-gradient(135deg,#ff00d4,#ff6a00); }
.c3 { background: linear-gradient(135deg,#7cff00,#00ff9d); }
.c4 { background: linear-gradient(135deg,#ffd900,#ff8800); }
.c5 { background: linear-gradient(135deg,#9b5cff,#5c9bff); }
.c6 { background: linear-gradient(135deg,#ff4d6d,#ff9a9e); }
.c7 { background: linear-gradient(135deg,#00ffe0,#0088ff); }
.c8 { background: linear-gradient(135deg,#ffffff,#aaaaaa); }

/* Variations */
.shape2 { clip-path: polygon(50% 0%, 90% 50%, 50% 100%, 10% 50%); }
.shape3 { clip-path: polygon(50% 0%, 100% 30%, 75% 100%, 25% 100%, 0% 30%); }
.shape4 { border-radius: 50%; }

h1 {
  font-weight: 500;
  font-size: 22px;
  margin-bottom: 10px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hidden {
  display: none;
}
</style>
</head>

<body>
<div class="app">
  <div id="menu" class="glass">
    <h1>💎 Diamond Memory</h1>

    <div>
      <p>Antall kort</p>
      <button onclick="startGame(16)">16</button>
      <button onclick="startGame(24)">24</button>
    </div>

    <div>
      <p>Spillmodus</p>
      <button onclick="setMode('pvp')">Mot venn</button>
      <button onclick="setMode('bot')">Mot bot</button>
    </div>
  </div>

  <div id="game" class="hidden">
    <div class="topbar">
      <div id="status"></div>
      <button onclick="restart()">↺</button>
    </div>
    <div id="board" class="board"></div>
  </div>
</div>

<script>
let mode = "pvp";
let size = 16;
let first = null;
let lock = false;
let turn = 1;
let scores = [0,0];

function setMode(m) {
  mode = m;
}

function startGame(s) {
  size = s;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  setupBoard();
}

function restart() {
  location.reload();
}

function setupBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  const cols = size === 16 ? 4 : 6;
  board.style.gridTemplateColumns = `repeat(${cols},1fr)`;

  let pairs = size / 2;
  let items = [];

  for (let i=0;i<pairs;i++) {
    items.push(i,i);
  }

  items.sort(()=>Math.random()-0.5);

  items.forEach(i => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.value = i;

    const shapeClass = ["","shape2","shape3","shape4"][i%4];
    const colorClass = "c"+((i%8)+1);

    card.innerHTML = `
      <div class="face front"></div>
      <div class="face back">
        <div class="diamond ${shapeClass} ${colorClass}"></div>
      </div>
    `;

    card.onclick = () => flip(card);
    board.appendChild(card);
  });

  updateStatus();
}

function flip(card) {
  if (lock || card.classList.contains("flip")) return;

  card.classList.add("flip");

  if (!first) {
    first = card;
    return;
  }

  if (first.dataset.value === card.dataset.value) {
    scores[turn-1]++;
    first = null;
    updateStatus();
    checkWin();
  } else {
    lock = true;
    setTimeout(()=>{
      card.classList.remove("flip");
      first.classList.remove("flip");
      first = null;
      lock = false;
      nextTurn();
    },700);
  }
}

function nextTurn() {
  turn = turn === 1 ? 2 : 1;
  updateStatus();

  if (mode === "bot" && turn === 2) {
    botMove();
  }
}

function botMove() {
  const cards = [...document.querySelectorAll(".card:not(.flip)")];
  if (cards.length < 2) return;

  let c1 = cards[Math.floor(Math.random()*cards.length)];
  let c2 = cards.filter(c=>c!==c1)[Math.floor(Math.random()*(cards.length-1))];

  setTimeout(()=>flip(c1),300);
  setTimeout(()=>flip(c2),800);
}

function updateStatus() {
  document.getElementById("status").innerText =
    `Spiller ${turn} | ${scores[0]} - ${scores[1]}`;
}

function checkWin() {
  if (document.querySelectorAll(".card:not(.flip)").length === 0) {
    setTimeout(()=>{
      alert(scores[0] === scores[1]
        ? "Uavgjort!"
        : `Spiller ${scores[0]>scores[1]?1:2} vinner!`);
    },300);
  }
}
</script>
</body>
</html>
