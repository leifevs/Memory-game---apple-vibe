<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diamond Memory</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #1b1f2a, #0b0d12);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* APP WRAPPER */
.app {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* GLASS PANEL */
.panel {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
  font-weight: 600;
  font-size: 20px;
  margin: 0 0 15px 0;
  opacity: 0.95;
}

button {
  background: rgba(255,255,255,0.08);
  border: none;
  padding: 12px 14px;
  border-radius: 14px;
  color: white;
  font-size: 14px;
  margin: 6px;
  cursor: pointer;
  transition: 0.2s ease;
}
button:hover {
  background: rgba(255,255,255,0.16);
  transform: translateY(-1px);
}

/* BOARD */
.board {
  display: grid;
  gap: 10px;
  margin-top: 15px;
}

/* CARD */
.card {
  aspect-ratio: 1;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.2,.8,.2,1);
  border-radius: 16px;
}

.card.flipped {
  transform: rotateY(180deg);
}

.side {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
}

/* FRONT */
.front {
  background: rgba(255,255,255,0.06);
}

/* BACK */
.back {
  transform: rotateY(180deg);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* DIAMONDS */
.diamond {
  width: 60%;
  height: 60%;
  clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
}

/* COLORS */
.c1 { background: linear-gradient(135deg,#00e5ff,#0066ff); }
.c2 { background: linear-gradient(135deg,#ff00cc,#ff5e00); }
.c3 { background: linear-gradient(135deg,#00ff88,#00c2ff); }
.c4 { background: linear-gradient(135deg,#ffe600,#ff7b00); }
.c5 { background: linear-gradient(135deg,#9d4edd,#3a86ff); }
.c6 { background: linear-gradient(135deg,#ff4d6d,#ffb3c1); }

/* STATUS */
.status {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="app">

  <div id="menu" class="panel">
    <h1>💎 Diamond Memory</h1>

    <div>
      <p>Antall kort</p>
      <button onclick="start(16)">16</button>
      <button onclick="start(24)">24</button>
    </div>

    <div>
      <p>Modus</p>
      <button onclick="mode='pvp'">2 Spillere</button>
      <button onclick="mode='bot'">Mot Bot</button>
    </div>
  </div>

  <div id="game" class="panel" style="display:none;">
    <div class="status">
      <div id="turn"></div>
      <div id="score"></div>
    </div>
    <div id="board" class="board"></div>
  </div>

</div>

<script>
let mode = "pvp";
let size = 16;

let first = null;
let lock = false;
let turn = 1;
let score = [0,0];

let memory = {}; // bot memory

function start(s){
  size = s;
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  setup();
}

function setup(){
  const board = document.getElementById("board");
  board.innerHTML="";

  const cols = size===16 ? 4 : 6;
  board.style.gridTemplateColumns = `repeat(${cols},1fr)`;

  let values = [];
  for(let i=0;i<size/2;i++){
    values.push(i,i);
  }

  values.sort(()=>Math.random()-0.5);

  values.forEach((v,i)=>{
    const card = document.createElement("div");
    card.className="card";
    card.dataset.value=v;

    card.innerHTML=`
      <div class="side front"></div>
      <div class="side back">
        <div class="diamond c${(v%6)+1}"></div>
      </div>
    `;

    card.onclick=()=>flip(card);
    board.appendChild(card);
  });

  updateUI();
}

function flip(card){
  if(lock || card.classList.contains("flipped")) return;

  card.classList.add("flipped");

  if(!first){
    first = card;
    return;
  }

  // match
  if(first.dataset.value === card.dataset.value){
    score[turn-1]++;
    first = null;
    updateUI();
    checkWin();
    return;
  }

  // mismatch
  lock=true;

  setTimeout(()=>{
    card.classList.remove("flipped");
    first.classList.remove("flipped");
    first=null;
    lock=false;
    nextTurn();
  },650);
}

function nextTurn(){
  turn = turn===1?2:1;
  updateUI();

  if(mode==="bot" && turn===2){
    botPlay();
  }
}

function botPlay(){
  const cards=[...document.querySelectorAll(".card:not(.flipped)")];
  if(cards.length<2) return;

  // smarter bot: sometimes remembers
  let pick1, pick2;

  for(let c of cards){
    let v=c.dataset.value;
    if(memory[v] && memory[v]!==c){
      pick1 = c;
      pick2 = memory[v];
      break;
    }
  }

  if(!pick1){
    pick1 = cards[Math.floor(Math.random()*cards.length)];
    pick2 = cards.filter(c=>c!==pick1)[Math.floor(Math.random()*(cards.length-1))];
  }

  setTimeout(()=>flip(pick1),400);
  setTimeout(()=>flip(pick2),1000);
}

function updateUI(){
  document.getElementById("turn").innerText = `Spiller ${turn}`;
  document.getElementById("score").innerText = `${score[0]} - ${score[1]}`;
}

function checkWin(){
  if(document.querySelectorAll(".card:not(.flipped)").length===0){
    setTimeout(()=>{
      alert(score[0]===score[1]?"Uavgjort!":
      `Spiller ${score[0]>score[1]?1:2} vinner!`);
    },300);
  }
}
</script>

</body>
</html>
